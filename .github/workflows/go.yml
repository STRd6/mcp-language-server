name: CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Cap go test at 2m per package; default 10m lets LSP hangs burn full jobs.
env:
  GOFLAGS: "-timeout=2m"

jobs:
  unit-tests:
    name: Unit Tests and Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: Build
        run: go build -o mcp-language-server

      - name: Install just
        run: curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Run unit tests
        run: go test ./internal/...

      - name: Run code quality checks
        run: just check

  integration-tests:
    name: ${{ matrix.display }} Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - lsp: go
            display: Go
            install: go install golang.org/x/tools/gopls@latest
          - lsp: python
            display: Python
            install: npm install -g pyright
          - lsp: typescript
            display: TypeScript
            install: npm install -g typescript typescript-language-server
          - lsp: civet
            display: Civet
            install: npm install -g @danielx/civet-language-server
          - lsp: rust
            display: Rust
          - lsp: clangd
            display: Clangd
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: Set up Python
        if: matrix.lsp == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Set up Node.js
        if: matrix.lsp == 'typescript' || matrix.lsp == 'civet'
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Rust
        if: matrix.lsp == 'rust'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src, rust-analyzer

      - name: Install clangd toolchain
        if: matrix.lsp == 'clangd'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-16 llvm-16 clangd-16 bear
          sudo ln -sf /usr/bin/clangd-16 /usr/bin/clangd
          clangd --version
          cd integrationtests/workspaces/clangd && bear -- make

      - name: Install ${{ matrix.display }} LSP
        if: matrix.install != ''
        run: ${{ matrix.install }}

      - name: Run ${{ matrix.display }} integration tests
        run: go test ./integrationtests/tests/${{ matrix.lsp }}/...
